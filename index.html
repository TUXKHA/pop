<!DOCTYPE html>
<html>
<head>
  <title>Test Camera Refresh</title>
</head>
<body>

<h2>Live Image Test</h2>

<img id="cam" width="100%">

<script>
function refreshImage() {
  document.getElementById("cam").src =
    "https://placehold.co/400x300?text=Camera&t=" + new Date().getTime();
}

// slower refresh (important for Blynk)
setInterval(refreshImage, 1000);

refreshImage();
</script>

</body>
</html>
